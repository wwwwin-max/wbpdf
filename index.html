<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Word 转 PDF</title>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script src="mammoth.browser.min.js"></script>
    <script src="html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            text-align: center;
            padding: 10px;
            background: #f9f9f9;
        }
        .btn {
            background: #007aff;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            border: none;
            margin: 5px;
        }
        #msg { margin: 15px 0; color: #333; font-size: 14px; }
        #preview-box {
            margin: 15px auto;
            max-width: 100%;
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: none;
            overflow: auto;
            max-height: 50vh;
        }
        #preview-box img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h3>📄 Word 转 PDF</h3>
    <p id="tip">点击下方按钮选择 .docx 文件</p>
    <input type="file" id="fileInput" accept=".docx" style="display:none">
    <button class="btn" id="selectBtn">选择 Word 文件</button>
    <div id="msg"></div>
    <div id="preview-box"></div>
    <button class="btn" id="downloadBtn" style="display:none;">⬇️ 下载 PDF</button>

    <script>
        const btn = document.getElementById('selectBtn');
        const msgDiv = document.getElementById('msg');
        const tip = document.getElementById('tip');
        const fileInput = document.getElementById('fileInput');
        const previewBox = document.getElementById('preview-box');
        const downloadBtn = document.getElementById('downloadBtn');

        const isWechat = /MicroMessenger/i.test(navigator.userAgent);
        let currentFileName = 'document.docx';
        let currentHtml = '';

        // 核心转换函数：docx → HTML 预览
        async function convertToPreview(file) {
            msgDiv.innerText = '正在读取文件...';
            currentFileName = file.name;
            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.convertToHtml(
                    { arrayBuffer },
                    {
                        convertImage: mammoth.images.imgElement(function(image) {
                            return image.read("base64").then(function(buffer) {
                                return {
                                    src: "data:" + image.contentType + ";base64," + buffer
                                };
                            });
                        })
                    }
                );
                const html = result.value;
                if (!html.trim()) {
                    msgDiv.innerText = '文档内容为空，无法转换。';
                    return;
                }
                // 嵌入基础样式
                currentHtml = `<div style="font-family: 'Songti SC', 'SimSun', serif; font-size: 12pt; line-height: 1.8; color: #000; word-wrap: break-word;">${html}</div>`;
                previewBox.innerHTML = currentHtml;
                previewBox.style.display = 'block';
                downloadBtn.style.display = 'inline-block';
                msgDiv.innerText = '预览如下，点击下载 PDF 按钮保存。';
            } catch (err) {
                console.error(err);
                msgDiv.innerText = '转换失败：' + err.message;
            }
        }

        // 下载 PDF（直接从可见预览区导出）
        async function downloadPDF() {
            if (!previewBox.innerHTML) return;
            msgDiv.innerText = '正在生成 PDF...';
            // 隐藏下载按钮，避免被截图
            downloadBtn.style.display = 'none';
            try {
                const opt = {
                    margin: [10, 10, 10, 10],
                    filename: currentFileName.replace(/\.docx$/i, '') + '.pdf',
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                await html2pdf().set(opt).from(previewBox).save();
                msgDiv.innerText = '✅ PDF 已下载！';
            } catch (e) {
                msgDiv.innerText = '下载失败，请尝试截图或使用浏览器打印。';
            } finally {
                downloadBtn.style.display = 'inline-block';
            }
        }

        // 普通文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) convertToPreview(file);
        });

        // 微信专用
        function chooseWechatFile() {
            wx.chooseMessageFile({
                count: 1,
                type: 'file',
                extension: ['docx'],
                success: res => {
                    const localId = res.tempFiles[0].localId;
                    msgDiv.innerText = '正在读取文件...';
                    wx.getLocalFileData({
                        localId: localId,
                        success: async (res) => {
                            const base64 = res.localData;
                            const b64 = base64.includes('base64,') ? base64.split('base64,')[1] : base64;
                            const blob = b64toBlob(b64, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
                            convertToPreview(new File([blob], 'document.docx', { type: blob.type }));
                        },
                        fail: err => { msgDiv.innerText = '读取失败: '+JSON.stringify(err); }
                    });
                },
                fail: err => { msgDiv.innerText = '选择失败: '+JSON.stringify(err); }
            });
        }

        function b64toBlob(b64, type) {
            const bin = atob(b64);
            const u8 = new Uint8Array(bin.length);
            for(let i=0; i<bin.length; i++) u8[i] = bin.charCodeAt(i);
            return new Blob([u8], {type});
        }

        // 环境判断
        if (isWechat) {
            const signUrl = window.location.href.split('#')[0].replace(/\/$/, '');
            fetch('/api/wx_config?url=' + encodeURIComponent(signUrl))
                .then(r => r.json())
                .then(cfg => {
                    wx.config({
                        debug: false,
                        appId: cfg.appId,
                        timestamp: cfg.timestamp,
                        nonceStr: cfg.nonceStr,
                        signature: cfg.signature,
                        jsApiList: ['chooseMessageFile', 'getLocalFileData']
                    });
                    wx.ready(() => {
                        tip.innerText = '点击按钮直接从聊天记录选择文件';
                        btn.onclick = chooseWechatFile;
                    });
                    wx.error(() => {
                        tip.innerText = '（需保存文件后选择）';
                        btn.onclick = () => fileInput.click();
                    });
                })
                .catch(() => {
                    tip.innerText = '（需保存文件后选择）';
                    btn.onclick = () => fileInput.click();
                });
        } else {
            tip.innerText = '选择手机中的 .docx 文件（可先保存聊天文件）';
            btn.onclick = () => fileInput.click();
        }

        // 下载按钮事件
        downloadBtn.addEventListener('click', downloadPDF);
    </script>
</body>
</html>
