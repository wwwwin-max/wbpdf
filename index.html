<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Word 转 PDF</title>
    <!-- 微信 JS-SDK（仅在微信内有效） -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <!-- 转换库 -->
    <script src="mammoth.browser.min.js"></script>
    <script src="html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; }
        .btn { background: #07c160; color: white; padding: 14px 30px; border-radius: 10px; font-size: 18px; border: none; }
        #msg { margin-top: 20px; color: #555; }
    </style>
</head>
<body>
    <h3>📄 Word 转 PDF</h3>
    <p id="tip">点击下方按钮选择 .docx 文件</p>
    <input type="file" id="fileInput" accept=".docx" style="display:none">
    <button class="btn" id="selectBtn">选择 Word 文件</button>
    <div id="msg"></div>

    <script>
        const btn = document.getElementById('selectBtn');
        const msgDiv = document.getElementById('msg');
        const tip = document.getElementById('tip');
        const fileInput = document.getElementById('fileInput');

        // 判断是否在微信中
        const isWechat = /MicroMessenger/i.test(navigator.userAgent);

        // 核心转换函数（接收 File 对象或 base64 数据）
        async function convertFile(file) {
            msgDiv.innerText = '正在转换...';
            try {
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });
                const html = result.value;
                if (!html.trim()) { msgDiv.innerText = '文档内容为空'; return; }

                const div = document.createElement('div');
                div.innerHTML = html;
                div.style.position = 'absolute';
                div.style.left = '-9999px';
                div.style.top = '0';
                div.style.width = '210mm';
                document.body.appendChild(div);

                const opt = {
                    margin: [10,10,10,10],
                    filename: file.name.replace(/\.docx$/i,'') + '.pdf',
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                await html2pdf().set(opt).from(div).save();
                document.body.removeChild(div);
                msgDiv.innerText = '✅ PDF 已生成并下载！';
            } catch (err) {
                msgDiv.innerText = '转换失败：' + err.message;
            }
        }

        // 处理普通文件选择
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await convertFile(file);
        });

        // 微信专用：选择聊天文件
        function chooseWechatFile() {
            wx.chooseMessageFile({
                count: 1,
                type: 'file',
                extension: ['docx'],
                success: res => {
                    const localId = res.tempFiles[0].localId;
                    msgDiv.innerText = '正在读取文件...';
                    wx.getLocalFileData({
                        localId: localId,
                        success: async (res) => {
                            const base64 = res.localData;
                            const b64 = base64.includes('base64,') ? base64.split('base64,')[1] : base64;
                            const blob = b64toBlob(b64, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
                            await convertFile(new File([blob], 'document.docx', { type: blob.type }));
                        },
                        fail: err => { msgDiv.innerText = '读取失败: '+JSON.stringify(err); }
                    });
                },
                fail: err => { msgDiv.innerText = '选择失败: '+JSON.stringify(err); }
            });
        }

        function b64toBlob(b64, type) {
            const bin = atob(b64);
            const u8 = new Uint8Array(bin.length);
            for(let i=0; i<bin.length; i++) u8[i] = bin.charCodeAt(i);
            return new Blob([u8], {type});
        }

        // 主逻辑
        if (isWechat) {
            // 尝试初始化微信 SDK
            const signUrl = window.location.href.split('#')[0].replace(/\/$/, '');
            fetch('/api/wx_config?url=' + encodeURIComponent(signUrl))
                .then(r => r.json())
                .then(cfg => {
                    wx.config({
                        debug: false,
                        appId: cfg.appId,
                        timestamp: cfg.timestamp,
                        nonceStr: cfg.nonceStr,
                        signature: cfg.signature,
                        jsApiList: ['chooseMessageFile', 'getLocalFileData']
                    });
                    wx.ready(() => {
                        tip.innerText = '点击按钮直接从聊天记录选择文件';
                        btn.onclick = chooseWechatFile;
                    });
                    wx.error(err => {
                        console.error('微信 SDK 失败', err);
                        // 降级为普通文件选择
                        tip.innerText = '（聊天文件需先保存到手机，再选择）';
                        btn.onclick = () => fileInput.click();
                    });
                })
                .catch(() => {
                    tip.innerText = '（聊天文件需先保存到手机，再选择）';
                    btn.onclick = () => fileInput.click();
                });
        } else {
            // 非微信环境，直接使用文件选择器
            tip.innerText = '选择手机中的 .docx 文件（可将聊天文件保存到手机后再选）';
            btn.onclick = () => fileInput.click();
        }
    </script>
</body>
</html>
