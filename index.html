<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Word 转 PDF</title>
    <!-- 微信 JS-SDK（仅微信内有效） -->
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <!-- 转换库 -->
    <script src="mammoth.browser.min.js"></script>
    <script src="html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
        .btn { background: #07c160; color: white; padding: 14px 30px; border-radius: 10px; font-size: 18px; border: none; }
        #msg { margin-top: 20px; color: #555; }
    </style>
</head>
<body>
    <h3>📄 Word 转 PDF</h3>
    <p id="tip">点击下方按钮选择 .docx 文件</p>
    <input type="file" id="fileInput" accept=".docx" style="display:none">
    <button class="btn" id="selectBtn">选择 Word 文件</button>
    <div id="msg"></div>

    <script>
        const btn = document.getElementById('selectBtn');
        const msgDiv = document.getElementById('msg');
        const tip = document.getElementById('tip');
        const fileInput = document.getElementById('fileInput');

        const isWechat = /MicroMessenger/i.test(navigator.userAgent);

        // 核心转换函数（修复版）
        async function convertFile(file) {
            msgDiv.innerText = '正在转换...';
            try {
                const arrayBuffer = await file.arrayBuffer();
                // 转换 docx 为 HTML，并配置图片内联
                const result = await mammoth.convertToHtml(
                    { arrayBuffer: arrayBuffer },
                    {
                        convertImage: mammoth.images.imgElement(function(image) {
                            return image.read("base64").then(function(buffer) {
                                return {
                                    src: "data:" + image.contentType + ";base64," + buffer
                                };
                            });
                        })
                    }
                );
                let html = result.value;
                if (!html.trim()) {
                    msgDiv.innerText = '文档内容为空，无法转换。';
                    return;
                }

                // 嵌入基本样式，确保 PDF 中文字可读
                html = `
                    <div style="font-family: 'SimSun', 'Songti SC', serif; font-size: 12pt; line-height: 1.6; color: #000; padding: 20px; max-width: 100%; box-sizing: border-box;">
                        ${html}
                    </div>
                `;

                // 创建一个全屏容器（不隐藏），让 html2canvas 能正确渲染
                // 但我们需要导出整个容器到 PDF，所以创建一个覆盖层
                const wrapper = document.createElement('div');
                wrapper.style.position = 'fixed';
                wrapper.style.top = '0';
                wrapper.style.left = '0';
                wrapper.style.width = '100%';
                wrapper.style.height = '100%';
                wrapper.style.zIndex = '9999';
                wrapper.style.backgroundColor = 'white';
                wrapper.style.overflow = 'auto';
                wrapper.innerHTML = html;
                document.body.appendChild(wrapper);

                // 短暂延迟确保渲染
                await new Promise(resolve => setTimeout(resolve, 300));

                // 配置 html2pdf 选项
                const opt = {
                    margin: [10, 10, 10, 10],
                    filename: file.name.replace(/\.docx$/i, '') + '.pdf',
                    image: { type: 'jpeg', quality: 0.95 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        windowWidth: wrapper.scrollWidth,
                        windowHeight: wrapper.scrollHeight
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                await html2pdf().set(opt).from(wrapper).save();

                // 清理
                document.body.removeChild(wrapper);
                msgDiv.innerText = '✅ PDF 已生成并下载！';
            } catch (err) {
                console.error(err);
                msgDiv.innerText = '转换失败：' + err.message;
            }
        }

        // 文件输入
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) convertFile(file);
        });

        // 微信专用函数
        function chooseWechatFile() {
            wx.chooseMessageFile({
                count: 1,
                type: 'file',
                extension: ['docx'],
                success: res => {
                    const localId = res.tempFiles[0].localId;
                    msgDiv.innerText = '正在读取文件...';
                    wx.getLocalFileData({
                        localId: localId,
                        success: async (res) => {
                            const base64 = res.localData;
                            const b64 = base64.includes('base64,') ? base64.split('base64,')[1] : base64;
                            const blob = b64toBlob(b64, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
                            convertFile(new File([blob], 'document.docx', { type: blob.type }));
                        },
                        fail: err => { msgDiv.innerText = '读取失败: '+JSON.stringify(err); }
                    });
                },
                fail: err => { msgDiv.innerText = '选择失败: '+JSON.stringify(err); }
            });
        }

        function b64toBlob(b64, type) {
            const bin = atob(b64);
            const u8 = new Uint8Array(bin.length);
            for(let i=0; i<bin.length; i++) u8[i] = bin.charCodeAt(i);
            return new Blob([u8], {type});
        }

        // 环境判断（微信 or 普通浏览器）
        if (isWechat) {
            const signUrl = window.location.href.split('#')[0].replace(/\/$/, '');
            fetch('/api/wx_config?url=' + encodeURIComponent(signUrl))
                .then(r => r.json())
                .then(cfg => {
                    wx.config({
                        debug: false,
                        appId: cfg.appId,
                        timestamp: cfg.timestamp,
                        nonceStr: cfg.nonceStr,
                        signature: cfg.signature,
                        jsApiList: ['chooseMessageFile', 'getLocalFileData']
                    });
                    wx.ready(() => {
                        tip.innerText = '点击按钮直接从聊天记录选择文件';
                        btn.onclick = chooseWechatFile;
                    });
                    wx.error(() => {
                        tip.innerText = '（需保存文件后选择）';
                        btn.onclick = () => fileInput.click();
                    });
                })
                .catch(() => {
                    tip.innerText = '（需保存文件后选择）';
                    btn.onclick = () => fileInput.click();
                });
        } else {
            tip.innerText = '选择手机中的 .docx 文件（先保存聊天文件到手机）';
            btn.onclick = () => fileInput.click();
        }
    </script>
</body>
</html>
